<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>資産ダッシュボード</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700;800&family=Noto+Sans+JP:wght@700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<style>
:root {
  --bg: #080c14;
  --surface: #0d1520;
  --surface2: #111d2e;
  --border: rgba(56,189,248,0.12);
  --accent: #38bdf8;
  --text: #e2e8f0;
  --muted: #64748b;
  --red: #f87171;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Noto Sans JP', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-weight: 700;
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(56,189,248,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(56,189,248,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  max-width: 1100px;
  margin: 0 auto;
  padding: 12px 16px 32px;
}

/* ── Header ── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 0 12px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 14px;
  flex-wrap: wrap;
  gap: 8px;
}

.logo {
  font-family: var(--mono);
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 12px var(--accent);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}

.timestamp {
  font-family: var(--mono);
  font-size: 1rem;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: 0.05em;
}

/* ── Top Section: Donut + Overview 50/50 ── */
.top-section {
  display: flex;
  gap: 14px;
  margin-bottom: 14px;
  align-items: stretch;
}

.donut-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  animation: fadeUp 0.4s ease both;
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}

.donut-wrap {
  position: relative;
  width: 100%;
  max-width: 420px;
  aspect-ratio: 1;
}

.donut-wrap canvas {
  display: block;
  width: 100% !important;
  height: 100% !important;
}

.donut-center {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  pointer-events: none;
  z-index: 3;
}
.donut-center-label {
  font-family: var(--mono);
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.donut-center-value {
  font-family: var(--mono);
  font-size: 2.4rem;
  font-weight: 700;
  color: var(--text);
  line-height: 1.2;
  margin-top: 2px;
}
.donut-center-unit {
  font-family: var(--mono);
  font-size: 0.8rem;
  font-weight: 700;
  color: var(--muted);
}

/* ── Overview Cards ── */
.overview-section {
  flex: 1;
  min-width: 0;
}

.summary-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  height: 100%;
  align-content: stretch;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  position: relative;
  overflow: hidden;
  transition: border-color 0.2s;
  animation: fadeUp 0.4s ease both;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.card:hover { border-color: rgba(56,189,248,0.3); }

.card-top-bar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 6px;
}

.card-label {
  font-family: var(--mono);
  font-size: 0.9rem;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.card-value {
  font-family: var(--mono);
  font-size: 1.5rem;
  font-weight: 700;
  line-height: 1;
}
.card-sub {
  font-family: var(--mono);
  font-size: 1rem;
  font-weight: 700;
  color: var(--muted);
  margin-top: 5px;
}

/* ── Table ── */
.table-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  animation: fadeUp 0.4s ease both;
}
.table-scroll { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
th {
  font-family: var(--mono);
  font-size: 0.68rem;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 10px 20px;
  text-align: left;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
th.r { text-align: right; }
td {
  padding: 10px 20px;
  border-bottom: 1px solid rgba(56,189,248,0.05);
  font-family: var(--mono);
  font-size: 0.92rem;
  font-weight: 700;
  white-space: nowrap;
  color: var(--text);
}
td.r { text-align: right; }
td.name {
  font-family: var(--sans);
  font-size: 0.92rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 320px;
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(56,189,248,0.03); }

.badge {
  display: inline-block;
  font-family: var(--mono);
  font-size: 0.72rem;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 3px;
  letter-spacing: 0.08em;
}
.neg { color: var(--red); }

#loading {
  text-align: center;
  padding: 6rem;
  font-family: var(--mono);
  font-size: 0.8rem;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: 0.15em;
}
#error {
  display: none;
  text-align: center;
  padding: 4rem;
  font-family: var(--mono);
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--red);
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.card:nth-child(1) { animation-delay: 0.05s; }
.card:nth-child(2) { animation-delay: 0.10s; }
.card:nth-child(3) { animation-delay: 0.15s; }
.card:nth-child(4) { animation-delay: 0.20s; }
.card:nth-child(5) { animation-delay: 0.25s; }
.card:nth-child(6) { animation-delay: 0.30s; }

/* ── Mobile ── */
@media (max-width: 768px) {
  .top-section {
    flex-direction: column;
  }
  .donut-section {
    padding: 12px 4px;
  }
  .donut-wrap {
    max-width: 280px;
    margin: 0 auto;
  }
  .donut-center-value { font-size: 1.8rem; }
  .donut-center-label { font-size: 0.65rem; }
  .donut-center-unit { font-size: 0.7rem; }
  .summary-grid {
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    height: auto;
  }
  .card { padding: 10px 12px; }
  .card-value { font-size: 1.2rem; }
  .card-label { font-size: 0.75rem; }
  .card-sub { font-size: 0.85rem; }
  td.name { max-width: 160px; font-size: 0.82rem; }
  th { padding: 8px 12px; font-size: 0.6rem; }
  td { padding: 8px 12px; font-size: 0.82rem; }
}
</style>
</head>
<body>

<div class="container">
  <div id="loading">LOADING...</div>
  <div id="error">データの読み込みに失敗しました。<br>data.json が同じディレクトリにあるか確認してください。</div>
  <div id="main" style="display:none"></div>
</div>

<script>
const CAT_CONFIG = {
  "GLD":  { color: "#fbbf24", label: "ゴールド" },
  "円":   { color: "#f472b6", label: "円資産" },
  "ドル": { color: "#818cf8", label: "ドル建て" },
  "VT":   { color: "#38bdf8", label: "全世界株" },
  "債券": { color: "#34d399", label: "債券" },
  "暗号": { color: "#fb923c", label: "暗号資産" },
  "日本": { color: "#f87171", label: "日本株" },
  "サウス":{ color: "#2dd4bf", label: "サウス" },
};
const DEFAULT_COLOR = "#64748b";

function catColor(c) { return (CAT_CONFIG[c]||{}).color||DEFAULT_COLOR; }
function catLabel(c) { return (CAT_CONFIG[c]||{}).label||c; }
function fmtNoComma(v) { return String(Math.round(v)); }

Chart.defaults.color = '#64748b';
Chart.defaults.font.family = "'JetBrains Mono', monospace";
Chart.defaults.font.weight = 700;

Chart.register(ChartDataLabels);

function makeDoughnut(id, items, total) {
  const ctx = document.getElementById(id).getContext('2d');
  const colors = items.map(i => catColor(i.category||i.name));

  return new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: items.map(i => catLabel(i.category||i.name)),
      datasets: [{
        data: items.map(i => i.value),
        backgroundColor: colors.map(c => c + 'cc'),
        borderColor: '#080c14',
        borderWidth: 3,
        hoverOffset: 0,
      }]
    },
    options: {
      cutout: '55%',
      responsive: true,
      maintainAspectRatio: true,
      events: [],
      layout: {
        padding: 2
      },
      plugins: {
        legend: { display: false },
        tooltip: { enabled: false },
        datalabels: {
          display: function(ctx) {
            const value = ctx.dataset.data[ctx.dataIndex];
            return total > 0 && (value / total) > 0.04;
          },
          anchor: 'center',
          align: 'center',
          offset: 0,
          color: '#fff',
          textAlign: 'center',
          font: function(ctx) {
            const value = ctx.dataset ? ctx.dataset.data[ctx.dataIndex] : 0;
            const pct = total > 0 ? (value / total) : 0;
            const isMobile = window.innerWidth <= 768;
            const baseSize = isMobile ? 9 : 11;
            return {
              family: "'Noto Sans JP', sans-serif",
              weight: 900,
              size: pct > 0.25 ? baseSize + 1 : baseSize
            };
          },
          formatter: function(value, ctx) {
            const item = items[ctx.dataIndex];
            if (!item) return '';
            const label = catLabel(item.category || item.name);
            const pct = total > 0 ? ((value / total) * 100).toFixed(1) : 0;
            return label + '\n' + fmtNoComma(value) + '万\n' + pct + '%';
          }
        }
      }
    },
    plugins: []
  });
}

function makeAllTable(items, total) {
  let rows = '';
  items.filter(i => i.value !== 0).forEach(i => {
    const cat = i.category && i.category !== '-' ? i.category : '';
    const col = cat ? catColor(cat) : DEFAULT_COLOR;
    const isNeg = i.value < 0;
    const catCell = cat
      ? `<td><span class="badge" style="background:${col}22;color:${col}">${catLabel(cat)}</span></td>`
      : `<td><span class="badge" style="background:rgba(100,116,139,0.15);color:#64748b">—</span></td>`;
    rows += `<tr>
      <td class="name">${i.name}</td>
      ${catCell}
      <td class="r ${isNeg?'neg':''}">${isNeg?'−':''}${fmtNoComma(Math.abs(i.value))}<span style="font-size:0.65rem;color:var(--muted);margin-left:3px">万円</span></td>
    </tr>`;
  });
  return `<div class="table-wrap">
    <div class="table-scroll"><table>
      <thead><tr><th>NAME</th><th>CATEGORY</th><th class="r">AMOUNT</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>
  </div>`;
}

async function init() {
  try {
    const res = await fetch('./data.json');
    if (!res.ok) throw new Error('fetch failed');
    const data = await res.json();
    render(data);
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
  }
}

function render(data) {
  document.getElementById('loading').style.display = 'none';
  const main = document.getElementById('main');
  main.style.display = 'block';

  const positiveCats = data.categories.filter(c => c.value > 0);

  let catCards = '';
  positiveCats.forEach(c => {
    const col = catColor(c.name);
    const pct = data.total > 0 ? ((c.value / data.total) * 100).toFixed(1) : 0;
    catCards += `<div class="card">
      <div class="card-top-bar" style="background:${col}"></div>
      <div class="card-label">${catLabel(c.name)}</div>
      <div class="card-value" style="color:${col}">${fmtNoComma(c.value)}<span style="font-size:0.6rem;color:var(--muted);margin-left:4px">万円</span></div>
      <div class="card-sub">${pct}%</div>
    </div>`;
  });

  main.innerHTML = `
    <header>
      <div class="logo">
        <div class="logo-dot"></div>
        ZAIM_DASH
      </div>
      <span class="timestamp">${data.updated} 更新</span>
    </header>

    <div class="top-section">
      <div class="donut-section">
        <div class="donut-wrap">
          <canvas id="pie-main"></canvas>
          <div class="donut-center">
            <div class="donut-center-label">TOTAL</div>
            <div class="donut-center-value">${fmtNoComma(data.total)}</div>
            <div class="donut-center-unit">万円</div>
          </div>
        </div>
      </div>
      <div class="overview-section">
        <div class="summary-grid">${catCards}</div>
      </div>
    </div>

    ${makeAllTable(data.accounts, data.total)}
  `;

  setTimeout(() => {
    const ovItems = positiveCats.map(c => ({...c, category: c.name}));
    makeDoughnut('pie-main', ovItems, data.total);
  }, 80);
}

init();
</script>
</body>
</html>
