<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>資産ダッシュボード</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800;900&family=Noto+Sans+JP:wght@700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --surface2: #1a1a26;
  --border: rgba(255,255,255,0.06);
  --text: #f0f0f5;
  --text2: #9a9ab0;
  --text3: #5a5a72;

  --c-gld:   #FFD666;
  --c-yen:   #FF6B9D;
  --c-dol:   #C084FC;
  --c-vt:    #66D9FF;
  --c-bond:  #34D399;
  --c-crypto:#F59E0B;
  --c-jp:    #FB7185;
  --c-other: #64748B;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans JP', 'Outfit', sans-serif;
  font-weight: 700;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.6;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  top: -40%; left: -20%;
  width: 80%; height: 80%;
  background: radial-gradient(ellipse, rgba(192,132,252,0.06) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}
body::after {
  content: '';
  position: fixed;
  bottom: -30%; right: -20%;
  width: 70%; height: 70%;
  background: radial-gradient(ellipse, rgba(255,214,102,0.04) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

.app {
  max-width: 1000px;
  margin: 0 auto;
  padding: 2.5rem 1.5rem 5rem;
  position: relative;
  z-index: 1;
}

/* ── ヘッダー ── */
.header {
  text-align: center;
  margin-bottom: 3rem;
  animation: slideUp 0.6s ease;
}
.header-label {
  font-size: 12px;
  letter-spacing: 0.25em;
  color: var(--text3);
  text-transform: uppercase;
  margin-bottom: 8px;
  font-weight: 800;
}
.header-total {
  font-family: 'Outfit', sans-serif;
  font-size: clamp(48px, 10vw, 72px);
  font-weight: 900;
  letter-spacing: -0.03em;
  background: linear-gradient(135deg, #66D9FF, #C084FC, #FFD666, #FF6B9D);
  background-size: 300% 300%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: gradientShift 6s ease infinite;
  line-height: 1.1;
}
.header-unit {
  font-size: 18px;
  color: var(--text2);
  font-weight: 800;
  margin-top: 4px;
}
.header-updated {
  font-size: 12px;
  color: var(--text3);
  margin-top: 12px;
  font-weight: 700;
}

@keyframes gradientShift {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ── セクションタイトル ── */
.section-title {
  font-size: 13px;
  letter-spacing: 0.2em;
  color: var(--text3);
  text-transform: uppercase;
  margin-bottom: 1.2rem;
  padding-left: 4px;
  font-weight: 900;
}

/* ── カテゴリカード ── */
.cat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 12px;
  margin-bottom: 3rem;
  animation: slideUp 0.6s ease 0.1s both;
}
.cat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 18px 16px;
  position: relative;
  overflow: hidden;
  transition: transform 0.2s, box-shadow 0.2s;
}
.cat-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}
.cat-card-name {
  font-size: 12px;
  color: var(--text2);
  margin-bottom: 8px;
  font-weight: 800;
}
.cat-card-value {
  font-family: 'Outfit', sans-serif;
  font-size: 22px;
  font-weight: 900;
  color: var(--text);
  letter-spacing: -0.02em;
}
.cat-card-pct {
  font-size: 11px;
  color: var(--text3);
  margin-top: 4px;
  font-weight: 700;
}

/* ── チャートエリア ── */
.charts {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 3rem;
  animation: slideUp 0.6s ease 0.2s both;
}
@media(max-width: 600px) { .charts { grid-template-columns: 1fr; } }

.chart-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 24px;
}
.chart-card-title {
  font-size: 12px;
  letter-spacing: 0.15em;
  color: var(--text3);
  text-transform: uppercase;
  margin-bottom: 16px;
  font-weight: 800;
}
.chart-wrap { position: relative; height: 240px; }
.legend {
  display: flex;
  flex-wrap: wrap;
  gap: 8px 16px;
  margin-top: 16px;
}
.l-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--text2);
  font-weight: 700;
}
.l-dot {
  width: 10px;
  height: 10px;
  border-radius: 3px;
  flex-shrink: 0;
}

/* ── テーブル ── */
.table-section {
  animation: slideUp 0.6s ease 0.3s both;
}
.tbl-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
}
table { width: 100%; border-collapse: collapse; }
thead th {
  font-size: 11px;
  letter-spacing: 0.12em;
  color: var(--text3);
  text-transform: uppercase;
  font-weight: 800;
  padding: 14px 18px;
  text-align: left;
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
}
thead th.r { text-align: right; }
tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
}
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: rgba(255,255,255,0.03); }
td {
  padding: 14px 18px;
  font-size: 13px;
  color: var(--text);
  font-weight: 700;
}
td.r {
  text-align: right;
  font-family: 'Outfit', sans-serif;
  font-weight: 800;
}
td.muted { color: var(--text2); }

.badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.04em;
}
.neg { color: #FB7185; }

.bar-bg {
  background: rgba(255,255,255,0.06);
  border-radius: 4px;
  height: 6px;
  width: 100%;
  overflow: hidden;
  min-width: 60px;
}
.bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.8s ease;
}

/* ── セパレータ ── */
.divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(192,132,252,0.2), rgba(255,214,102,0.2), transparent);
  margin: 3rem 0;
}

#loading {
  text-align: center;
  padding: 6rem;
  color: var(--text3);
  font-size: 14px;
  letter-spacing: 0.15em;
  font-weight: 800;
}
#error {
  display: none;
  text-align: center;
  padding: 4rem;
  color: #FB7185;
  font-size: 13px;
  font-weight: 700;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 3px; }
</style>
</head>
<body>
<div class="app">
  <div id="loading">LOADING...</div>
  <div id="error">データの読み込みに失敗しました。<br>data.json が同じディレクトリにあるか確認してください。</div>
  <div id="main" style="display:none"></div>
</div>

<script>
const CAT_CONFIG = {
  "GLD":  { color: "#FFD666", label: "ゴールド" },
  "円":   { color: "#FF6B9D", label: "円資産" },
  "ドル": { color: "#C084FC", label: "ドル建て" },
  "VT":   { color: "#66D9FF", label: "全世界株" },
  "債券": { color: "#34D399", label: "債券" },
  "暗号": { color: "#F59E0B", label: "暗号資産" },
  "日本": { color: "#FB7185", label: "日本株" },
  "サウス":{ color: "#38BDF8", label: "サウス" },
};
const DEFAULT_COLOR = "#64748B";

function catColor(c) { return (CAT_CONFIG[c]||{}).color||DEFAULT_COLOR; }
function catLabel(c) { return (CAT_CONFIG[c]||{}).label||c; }
function fmt(v) { return Math.round(v).toLocaleString('ja-JP'); }

Chart.defaults.color = '#5a5a72';
Chart.defaults.font.family = "'Outfit', 'Noto Sans JP', sans-serif";
Chart.defaults.font.weight = 700;

function makeDoughnut(id, items) {
  const ctx = document.getElementById(id).getContext('2d');
  const total = items.reduce((s,i)=>s+i.value,0);
  return new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: items.map(i=>catLabel(i.category||i.name)),
      datasets: [{
        data: items.map(i=>i.value),
        backgroundColor: items.map(i=>catColor(i.category||i.name)),
        borderWidth: 0,
        hoverOffset: 8,
      }]
    },
    options: {
      cutout: '68%',
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1a1a26',
          titleFont: { weight: 800, size: 13 },
          bodyFont: { weight: 700, size: 12 },
          borderColor: 'rgba(255,255,255,0.1)',
          borderWidth: 1,
          padding: 12,
          cornerRadius: 10,
          callbacks: {
            label: function(c) {
              const pct = total > 0 ? ((c.raw/total)*100).toFixed(1) : 0;
              return ` ${fmt(c.raw)} 万円 (${pct}%)`;
            }
          }
        }
      }
    }
  });
}

function makeBar(id, items) {
  const ctx = document.getElementById(id).getContext('2d');
  return new Chart(ctx, {
    type: 'bar',
    data: {
      labels: items.map(i => {
        const l = catLabel(i.category||i.name);
        return l.length > 6 ? l.slice(0,6)+'…' : l;
      }),
      datasets: [{
        data: items.map(i=>i.value),
        backgroundColor: items.map(i=>catColor(i.category||i.name)),
        borderRadius: 8,
        borderSkipped: false,
        barPercentage: 0.7,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1a1a26',
          titleFont: { weight: 800, size: 13 },
          bodyFont: { weight: 700, size: 12 },
          borderColor: 'rgba(255,255,255,0.1)',
          borderWidth: 1,
          padding: 12,
          cornerRadius: 10,
          callbacks: {
            label: c => ` ${fmt(c.raw)} 万円`
          }
        }
      },
      scales: {
        x: { ticks: { font: { size: 11, weight: 700 } }, grid: { display: false }, border: { display: false } },
        y: {
          ticks: { font: { size: 11, weight: 700 }, callback: v => fmt(v) },
          grid: { color: 'rgba(255,255,255,0.04)' },
          border: { display: false }
        }
      }
    }
  });
}

function makeLegend(containerId, items, total) {
  const el = document.getElementById(containerId);
  if (!el) return;
  items.forEach(i => {
    const pct = total > 0 ? ((i.value / total) * 100).toFixed(1) : 0;
    el.innerHTML += `<span class="l-item">
      <span class="l-dot" style="background:${catColor(i.category||i.name)}"></span>
      ${catLabel(i.category||i.name)} ${pct}%
    </span>`;
  });
}

function makeAllTable(items, total) {
  let rows = '';
  items.filter(i => i.value !== 0).forEach(i => {
    const pct = total > 0 ? ((Math.abs(i.value) / total) * 100).toFixed(1) : 0;
    const cat = i.category && i.category !== '-' ? i.category : '';
    const col = cat ? catColor(cat) : DEFAULT_COLOR;
    const isNeg = i.value < 0;
    const catCell = cat
      ? `<td><span class="badge" style="background:${col}18;color:${col}">${cat}</span></td>`
      : `<td><span class="badge" style="background:rgba(100,116,139,0.15);color:#64748B">—</span></td>`;
    rows += `<tr>
      <td class="muted">${i.name}</td>
      ${catCell}
      <td class="r ${isNeg?'neg':''}">${isNeg?'−':''}${fmt(Math.abs(i.value))}<span style="font-size:11px;color:var(--text3);margin-left:2px">万円</span></td>
      <td class="r" style="color:var(--text3)">${pct}%</td>
      <td style="min-width:70px"><div class="bar-bg"><div class="bar-fill" style="width:${Math.min(parseFloat(pct)*1.5,100)}%;background:${col}"></div></div></td>
    </tr>`;
  });
  return `<div class="tbl-wrap"><table>
    <thead><tr><th>名称</th><th>カテゴリ</th><th class="r">金額</th><th class="r">割合</th><th></th></tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

async function init() {
  try {
    const res = await fetch('./data.json');
    if (!res.ok) throw new Error('fetch failed');
    const data = await res.json();
    render(data);
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
  }
}

function render(data) {
  document.getElementById('loading').style.display = 'none';
  const main = document.getElementById('main');
  main.style.display = 'block';

  const positiveCats = data.categories.filter(c => c.value > 0);
  const positiveTotal = positiveCats.reduce((s,c)=>s+c.value, 0);

  let catCards = '';
  positiveCats.forEach(c => {
    const col = catColor(c.name);
    const pct = data.total > 0 ? ((c.value / data.total) * 100).toFixed(1) : 0;
    catCards += `<div class="cat-card">
      <div style="position:absolute;top:0;left:0;right:0;height:3px;background:${col};border-radius:16px 16px 0 0"></div>
      <div class="cat-card-name">${catLabel(c.name)}</div>
      <div class="cat-card-value">${fmt(c.value)}<span style="font-size:12px;color:var(--text3);margin-left:3px">万円</span></div>
      <div class="cat-card-pct">${pct}%</div>
    </div>`;
  });

  main.innerHTML = `
    <div class="header">
      <div class="header-label">Total Net Assets</div>
      <div class="header-total">${fmt(data.total)}</div>
      <div class="header-unit">万円</div>
      <div class="header-updated">${data.updated} 更新</div>
    </div>

    <div class="section-title">概要</div>
    <div class="cat-grid">${catCards}</div>

    <div class="charts">
      <div class="chart-card">
        <div class="chart-card-title">Asset Allocation</div>
        <div class="chart-wrap"><canvas id="pie-main"></canvas></div>
        <div class="legend" id="leg-main"></div>
      </div>
      <div class="chart-card">
        <div class="chart-card-title">By Category</div>
        <div class="chart-wrap"><canvas id="bar-main"></canvas></div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="table-section">
      <div class="section-title">全口座</div>
      ${makeAllTable(data.accounts, data.total)}
    </div>
  `;

  setTimeout(() => {
    const ovItems = positiveCats.map(c => ({...c, category: c.name}));
    makeDoughnut('pie-main', ovItems);
    makeBar('bar-main', ovItems);
    makeLegend('leg-main', ovItems, positiveTotal);
  }, 50);
}

init();
</script>
</body>
</html>
