<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>資産ダッシュボード</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --bg: #080c14;
  --surface: #0d1520;
  --surface2: #111d2e;
  --border: rgba(56,189,248,0.12);
  --accent: #38bdf8;
  --accent2: #818cf8;
  --green: #34d399;
  --red: #f87171;
  --yellow: #fbbf24;
  --pink: #f472b6;
  --orange: #fb923c;
  --text: #e2e8f0;
  --muted: #64748b;
  --mono: 'Space Mono', monospace;
  --sans: 'Noto Sans JP', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-weight: 700;
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(56,189,248,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(56,189,248,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  max-width: 1100px;
  margin: 0 auto;
  padding: 20px 16px 48px;
}

/* ── Header ── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 0 28px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 28px;
  flex-wrap: wrap;
  gap: 12px;
}

.logo {
  font-family: var(--mono);
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 12px var(--accent);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}

.timestamp {
  font-family: var(--mono);
  font-size: 1rem;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: 0.05em;
}

/* ── Donut Section ── */
.donut-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 32px 20px 40px;
  margin-bottom: 28px;
  animation: fadeUp 0.4s ease both;
}

.donut-section-title {
  font-family: var(--mono);
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 32px;
  text-align: center;
}

.donut-outer {
  position: relative;
  width: 100%;
  max-width: 560px;
  margin: 0 auto;
}

.donut-canvas-wrap {
  position: relative;
  width: 56%;
  margin: 0 auto;
}

.donut-canvas-wrap canvas {
  display: block;
  width: 100% !important;
  height: auto !important;
}

.donut-center {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  pointer-events: none;
  z-index: 3;
}
.donut-center-label {
  font-family: var(--mono);
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.donut-center-value {
  font-family: var(--mono);
  font-size: clamp(1.6rem, 4.5vw, 2.6rem);
  font-weight: 700;
  color: var(--text);
  line-height: 1.2;
  margin-top: 2px;
}
.donut-center-unit {
  font-family: var(--mono);
  font-size: 0.8rem;
  font-weight: 700;
  color: var(--muted);
}

/* ── Callouts ── */
.callout-svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 4;
  overflow: visible;
}

/* ── Section Title ── */
.section-title {
  font-family: var(--mono);
  font-size: 0.68rem;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 16px;
}

/* ── Summary Cards ── */
.summary-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px;
  margin-bottom: 28px;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  position: relative;
  overflow: hidden;
  transition: border-color 0.2s;
  animation: fadeUp 0.4s ease both;
}
.card:hover { border-color: rgba(56,189,248,0.3); }

.card-label {
  font-family: var(--mono);
  font-size: 0.62rem;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.card-value {
  font-family: var(--mono);
  font-size: 1.25rem;
  font-weight: 700;
  line-height: 1;
}
.card-sub {
  font-family: var(--mono);
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--muted);
  margin-top: 6px;
}

/* ── Divider ── */
.divider {
  height: 1px;
  background: var(--border);
  margin: 28px 0;
}

/* ── Table ── */
.table-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  animation: fadeUp 0.4s ease both;
}
.table-header {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
}
.table-title {
  font-family: var(--mono);
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.table-scroll { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
th {
  font-family: var(--mono);
  font-size: 0.6rem;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 10px 16px;
  text-align: left;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
th.r { text-align: right; }
td {
  padding: 12px 16px;
  border-bottom: 1px solid rgba(56,189,248,0.05);
  font-family: var(--mono);
  font-size: 0.78rem;
  font-weight: 700;
  white-space: nowrap;
  color: var(--text);
}
td.r { text-align: right; }
td.name { font-family: var(--sans); font-size: 0.78rem; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(56,189,248,0.03); }

.badge {
  display: inline-block;
  font-family: var(--mono);
  font-size: 0.58rem;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 3px;
  letter-spacing: 0.08em;
}
.neg { color: var(--red); }

.bar-bg {
  background: rgba(56,189,248,0.08);
  border-radius: 3px;
  height: 4px;
  width: 100%;
  overflow: hidden;
  min-width: 50px;
}
.bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.8s ease;
}

#loading {
  text-align: center;
  padding: 6rem;
  font-family: var(--mono);
  font-size: 0.8rem;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: 0.15em;
}
#error {
  display: none;
  text-align: center;
  padding: 4rem;
  font-family: var(--mono);
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--red);
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.card:nth-child(1) { animation-delay: 0.05s; }
.card:nth-child(2) { animation-delay: 0.10s; }
.card:nth-child(3) { animation-delay: 0.15s; }
.card:nth-child(4) { animation-delay: 0.20s; }
.card:nth-child(5) { animation-delay: 0.25s; }
.card:nth-child(6) { animation-delay: 0.30s; }
</style>
</head>
<body>

<div class="container">
  <div id="loading">LOADING...</div>
  <div id="error">データの読み込みに失敗しました。<br>data.json が同じディレクトリにあるか確認してください。</div>
  <div id="main" style="display:none"></div>
</div>

<script>
const CAT_CONFIG = {
  "GLD":  { color: "#fbbf24", label: "ゴールド" },
  "円":   { color: "#f472b6", label: "円資産" },
  "ドル": { color: "#818cf8", label: "ドル建て" },
  "VT":   { color: "#38bdf8", label: "全世界株" },
  "債券": { color: "#34d399", label: "債券" },
  "暗号": { color: "#fb923c", label: "暗号資産" },
  "日本": { color: "#f87171", label: "日本株" },
  "サウス":{ color: "#2dd4bf", label: "サウス" },
};
const DEFAULT_COLOR = "#64748b";

function catColor(c) { return (CAT_CONFIG[c]||{}).color||DEFAULT_COLOR; }
function catLabel(c) { return (CAT_CONFIG[c]||{}).label||c; }
function fmt(v) { return Math.round(v).toLocaleString('ja-JP'); }

Chart.defaults.color = '#64748b';
Chart.defaults.font.family = "'Space Mono', monospace";
Chart.defaults.font.weight = 700;

// ── SVG Callout builder (no overlap) ──
function buildCallouts(svgEl, items, total, outerW, outerH, canvasW, canvasH) {
  while (svgEl.firstChild) svgEl.removeChild(svgEl.firstChild);

  // donut center & radius in outer coordinate space
  const offsetX = (outerW - canvasW) / 2;
  const offsetY = (outerH - canvasH) / 2;
  const cx = offsetX + canvasW / 2;
  const cy = offsetY + canvasH / 2;
  const donutR = canvasW * 0.42;

  svgEl.setAttribute('viewBox', `0 0 ${outerW} ${outerH}`);

  const leftItems = [];
  const rightItems = [];
  let cumAngle = -Math.PI / 2;

  items.forEach(item => {
    const pct = total > 0 ? item.value / total : 0;
    const sliceAngle = pct * Math.PI * 2;
    const midAngle = cumAngle + sliceAngle / 2;
    cumAngle += sliceAngle;

    const col = catColor(item.category || item.name);
    const edgeX = cx + Math.cos(midAngle) * donutR;
    const edgeY = cy + Math.sin(midAngle) * donutR;
    const isRight = Math.cos(midAngle) >= 0;

    const entry = { item, pct, col, edgeX, edgeY, midAngle, isRight };
    if (isRight) rightItems.push(entry);
    else leftItems.push(entry);
  });

  // Sort each side by Y
  leftItems.sort((a, b) => a.edgeY - b.edgeY);
  rightItems.sort((a, b) => a.edgeY - b.edgeY);

  const lineH = outerH * 0.068;
  const fontSize = Math.max(11, outerW * 0.024);
  const subFontSize = Math.max(13, outerW * 0.028);
  const minGap = lineH * 2.2;

  function spreadY(entries) {
    if (entries.length === 0) return;
    // Assign initial Y, then push apart to avoid overlap
    const totalNeeded = entries.length * minGap;
    const topBound = Math.max(10, cy - totalNeeded / 2);
    entries.forEach((e, i) => {
      e.labelY = topBound + i * minGap;
    });
    // Clamp within bounds
    entries.forEach(e => {
      e.labelY = Math.max(lineH, Math.min(outerH - lineH, e.labelY));
    });
  }

  spreadY(leftItems);
  spreadY(rightItems);

  const rightX = offsetX + canvasW + (outerW - offsetX - canvasW) * 0.15;
  const leftX = offsetX * 0.85;

  function drawEntry(e, labelX, align) {
    const col = e.col;

    // Dot on edge
    const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    dot.setAttribute('cx', e.edgeX);
    dot.setAttribute('cy', e.edgeY);
    dot.setAttribute('r', '3.5');
    dot.setAttribute('fill', col);
    svgEl.appendChild(dot);

    // Elbow line: edge → horizontal anchor → label
    const elbowX = align === 'right' ? labelX - 6 : labelX + 6;
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', `M${e.edgeX},${e.edgeY} L${elbowX},${e.labelY}`);
    path.setAttribute('stroke', col);
    path.setAttribute('stroke-width', '1.2');
    path.setAttribute('fill', 'none');
    path.setAttribute('opacity', '0.45');
    svgEl.appendChild(path);

    // Horizontal tick
    const tickEnd = align === 'right' ? labelX + 4 : labelX - 4;
    const tick = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    tick.setAttribute('x1', elbowX);
    tick.setAttribute('y1', e.labelY);
    tick.setAttribute('x2', tickEnd);
    tick.setAttribute('y2', e.labelY);
    tick.setAttribute('stroke', col);
    tick.setAttribute('stroke-width', '1.2');
    tick.setAttribute('opacity', '0.45');
    svgEl.appendChild(tick);

    const anchor = align === 'right' ? 'start' : 'end';
    const textX = align === 'right' ? labelX + 8 : labelX - 8;

    // Category name
    const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    label.setAttribute('x', textX);
    label.setAttribute('y', e.labelY - 4);
    label.setAttribute('text-anchor', anchor);
    label.setAttribute('fill', col);
    label.setAttribute('font-family', "'Space Mono', monospace");
    label.setAttribute('font-size', fontSize);
    label.setAttribute('font-weight', '700');
    label.textContent = catLabel(e.item.category || e.item.name);
    svgEl.appendChild(label);

    // Value + pct
    const valText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    valText.setAttribute('x', textX);
    valText.setAttribute('y', e.labelY + subFontSize + 1);
    valText.setAttribute('text-anchor', anchor);
    valText.setAttribute('fill', '#e2e8f0');
    valText.setAttribute('font-family', "'Space Mono', monospace");
    valText.setAttribute('font-size', subFontSize);
    valText.setAttribute('font-weight', '700');
    valText.textContent = `${fmt(e.item.value)}万`;
    svgEl.appendChild(valText);

    const pctText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    pctText.setAttribute('x', textX);
    pctText.setAttribute('y', e.labelY + subFontSize * 2 + 4);
    pctText.setAttribute('text-anchor', anchor);
    pctText.setAttribute('fill', col);
    pctText.setAttribute('font-family', "'Space Mono', monospace");
    pctText.setAttribute('font-size', fontSize);
    pctText.setAttribute('font-weight', '700');
    pctText.textContent = `${(e.pct * 100).toFixed(1)}%`;
    svgEl.appendChild(pctText);
  }

  rightItems.forEach(e => drawEntry(e, rightX, 'right'));
  leftItems.forEach(e => drawEntry(e, leftX, 'left'));
}

function makeDoughnut(id, items, total) {
  const ctx = document.getElementById(id).getContext('2d');
  return new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: items.map(i => catLabel(i.category||i.name)),
      datasets: [{
        data: items.map(i => i.value),
        backgroundColor: items.map(i => catColor(i.category||i.name) + 'cc'),
        borderColor: '#080c14',
        borderWidth: 3,
        hoverOffset: 6,
      }]
    },
    options: {
      cutout: '62%',
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#0d1520',
          titleFont: { family: "'Space Mono', monospace", weight: 700, size: 12 },
          bodyFont: { family: "'Space Mono', monospace", weight: 700, size: 12 },
          borderColor: 'rgba(56,189,248,0.2)',
          borderWidth: 1,
          padding: 10,
          cornerRadius: 6,
          callbacks: {
            label: function(c) {
              const pct = total > 0 ? ((c.raw/total)*100).toFixed(1) : 0;
              return ` ${fmt(c.raw)} 万円 (${pct}%)`;
            }
          }
        }
      }
    }
  });
}

function makeAllTable(items, total) {
  let rows = '';
  items.filter(i => i.value !== 0).forEach(i => {
    const pct = total > 0 ? ((Math.abs(i.value) / total) * 100).toFixed(1) : 0;
    const cat = i.category && i.category !== '-' ? i.category : '';
    const col = cat ? catColor(cat) : DEFAULT_COLOR;
    const isNeg = i.value < 0;
    const catCell = cat
      ? `<td><span class="badge" style="background:${col}22;color:${col}">${cat}</span></td>`
      : `<td><span class="badge" style="background:rgba(100,116,139,0.15);color:#64748b">—</span></td>`;
    rows += `<tr>
      <td class="name">${i.name}</td>
      ${catCell}
      <td class="r ${isNeg?'neg':''}">${isNeg?'−':''}${fmt(Math.abs(i.value))}<span style="font-size:0.6rem;color:var(--muted);margin-left:3px">万円</span></td>
      <td class="r" style="color:var(--muted)">${pct}%</td>
      <td style="min-width:60px"><div class="bar-bg"><div class="bar-fill" style="width:${Math.min(parseFloat(pct)*1.5,100)}%;background:${col}"></div></div></td>
    </tr>`;
  });
  return `<div class="table-wrap">
    <div class="table-header"><div class="table-title">ALL ACCOUNTS</div></div>
    <div class="table-scroll"><table>
      <thead><tr><th>NAME</th><th>CATEGORY</th><th class="r">AMOUNT</th><th class="r">RATIO</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>
  </div>`;
}

async function init() {
  try {
    const res = await fetch('./data.json');
    if (!res.ok) throw new Error('fetch failed');
    const data = await res.json();
    render(data);
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
  }
}

function render(data) {
  document.getElementById('loading').style.display = 'none';
  const main = document.getElementById('main');
  main.style.display = 'block';

  const positiveCats = data.categories.filter(c => c.value > 0);
  const positiveTotal = positiveCats.reduce((s,c) => s+c.value, 0);

  let catCards = '';
  positiveCats.forEach(c => {
    const col = catColor(c.name);
    const pct = data.total > 0 ? ((c.value / data.total) * 100).toFixed(1) : 0;
    catCards += `<div class="card">
      <div style="position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,${col},transparent)"></div>
      <div class="card-label">${catLabel(c.name)}</div>
      <div class="card-value" style="color:${col}">${fmt(c.value)}<span style="font-size:0.65rem;color:var(--muted);margin-left:4px">万円</span></div>
      <div class="card-sub">${pct}%</div>
    </div>`;
  });

  main.innerHTML = `
    <header>
      <div class="logo">
        <div class="logo-dot"></div>
        ZAIM_DASH
      </div>
      <span class="timestamp">${data.updated} 更新</span>
    </header>

    <div class="donut-section">
      <div class="donut-section-title">ASSET ALLOCATION</div>
      <div class="donut-outer" id="donut-outer">
        <div class="donut-canvas-wrap" id="donut-canvas-wrap">
          <canvas id="pie-main"></canvas>
          <div class="donut-center">
            <div class="donut-center-label">TOTAL</div>
            <div class="donut-center-value">${fmt(data.total)}</div>
            <div class="donut-center-unit">万円</div>
          </div>
        </div>
        <svg class="callout-svg" id="callout-svg"></svg>
      </div>
    </div>

    <div class="section-title">— OVERVIEW</div>
    <div class="summary-grid">${catCards}</div>

    <div class="divider"></div>

    <div class="section-title">— ALL ACCOUNTS</div>
    ${makeAllTable(data.accounts, data.total)}
  `;

  setTimeout(() => {
    const ovItems = positiveCats.map(c => ({...c, category: c.name}));
    makeDoughnut('pie-main', ovItems, positiveTotal);

    function refreshCallouts() {
      const outer = document.getElementById('donut-outer');
      const wrap = document.getElementById('donut-canvas-wrap');
      const svg = document.getElementById('callout-svg');
      const outerW = outer.offsetWidth;
      const outerH = outer.offsetHeight;
      const canvasW = wrap.offsetWidth;
      const canvasH = wrap.offsetHeight;
      buildCallouts(svg, ovItems, positiveTotal, outerW, outerH, canvasW, canvasH);
    }

    // Wait for chart to fully render
    setTimeout(refreshCallouts, 120);

    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(refreshCallouts, 200);
    });
  }, 80);
}

init();
</script>
</body>
</html>
