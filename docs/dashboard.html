<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>資産ダッシュボード</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --bg: #080c14;
  --surface: #0d1520;
  --surface2: #111d2e;
  --border: rgba(56,189,248,0.12);
  --accent: #38bdf8;
  --accent2: #818cf8;
  --green: #34d399;
  --red: #f87171;
  --yellow: #fbbf24;
  --pink: #f472b6;
  --orange: #fb923c;
  --text: #e2e8f0;
  --muted: #64748b;
  --mono: 'Space Mono', monospace;
  --sans: 'Noto Sans JP', sans-serif;

  --c-gld:   #fbbf24;
  --c-yen:   #f472b6;
  --c-dol:   #818cf8;
  --c-vt:    #38bdf8;
  --c-bond:  #34d399;
  --c-crypto:#fb923c;
  --c-jp:    #f87171;
  --c-other: #64748b;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-weight: 700;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Grid background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(56,189,248,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(56,189,248,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  max-width: 1100px;
  margin: 0 auto;
  padding: 20px 16px 48px;
}

/* ── Header ── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 0 28px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 28px;
  flex-wrap: wrap;
  gap: 12px;
}

.logo {
  font-family: var(--mono);
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 12px var(--accent);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}

.timestamp {
  font-family: var(--mono);
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: 0.05em;
}

/* ── Section Title ── */
.section-title {
  font-family: var(--mono);
  font-size: 0.68rem;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 16px;
}

/* ── Summary Cards ── */
.summary-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px;
  margin-bottom: 28px;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  position: relative;
  overflow: hidden;
  transition: border-color 0.2s;
  animation: fadeUp 0.4s ease both;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
}
.card:hover { border-color: rgba(56,189,248,0.3); }

.card-label {
  font-family: var(--mono);
  font-size: 0.62rem;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.card-value {
  font-family: var(--mono);
  font-size: 1.25rem;
  font-weight: 700;
  color: var(--text);
  line-height: 1;
}

.card-sub {
  font-family: var(--mono);
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--muted);
  margin-top: 6px;
}

/* ── Total Header Card ── */
.total-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 28px 24px;
  margin-bottom: 28px;
  position: relative;
  overflow: hidden;
  animation: fadeUp 0.4s ease both;
}
.total-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent2), var(--yellow), var(--pink));
}

.total-label {
  font-family: var(--mono);
  font-size: 0.65rem;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.total-value {
  font-family: var(--mono);
  font-size: clamp(2rem, 6vw, 3.2rem);
  font-weight: 700;
  color: var(--text);
  line-height: 1;
}
.total-value span {
  font-size: 0.9rem;
  color: var(--muted);
  margin-left: 6px;
}

.total-updated {
  font-family: var(--mono);
  font-size: 0.65rem;
  font-weight: 700;
  color: var(--muted);
  margin-top: 10px;
  letter-spacing: 0.05em;
}

/* ── Charts ── */
.charts-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 28px;
}
@media (max-width: 640px) { .charts-grid { grid-template-columns: 1fr; } }

.chart-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
  animation: fadeUp 0.4s ease both;
}

.chart-title {
  font-family: var(--mono);
  font-size: 0.68rem;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 16px;
}

.chart-container { position: relative; height: 220px; }

.legend {
  display: flex;
  flex-wrap: wrap;
  gap: 6px 14px;
  margin-top: 14px;
}
.l-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-family: var(--mono);
  font-size: 0.68rem;
  font-weight: 700;
  color: var(--muted);
}
.l-dot {
  width: 8px; height: 8px;
  border-radius: 2px;
  flex-shrink: 0;
}

/* ── Divider ── */
.divider {
  height: 1px;
  background: var(--border);
  margin: 28px 0;
}

/* ── Table ── */
.table-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  animation: fadeUp 0.4s ease both;
}

.table-header {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
}

.table-title {
  font-family: var(--mono);
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.table-scroll { overflow-x: auto; }

table { width: 100%; border-collapse: collapse; }

th {
  font-family: var(--mono);
  font-size: 0.6rem;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 10px 16px;
  text-align: left;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
th.r { text-align: right; }

td {
  padding: 12px 16px;
  border-bottom: 1px solid rgba(56,189,248,0.05);
  font-family: var(--mono);
  font-size: 0.78rem;
  font-weight: 700;
  white-space: nowrap;
  color: var(--text);
}
td.r { text-align: right; }
td.name { font-family: var(--sans); font-size: 0.78rem; color: var(--text); }

tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(56,189,248,0.03); }

.badge {
  display: inline-block;
  font-family: var(--mono);
  font-size: 0.58rem;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 3px;
  letter-spacing: 0.08em;
}

.neg { color: var(--red); }

.bar-bg {
  background: rgba(56,189,248,0.08);
  border-radius: 3px;
  height: 4px;
  width: 100%;
  overflow: hidden;
  min-width: 50px;
}
.bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.8s ease;
}

/* ── Loading ── */
#loading {
  text-align: center;
  padding: 6rem;
  font-family: var(--mono);
  font-size: 0.8rem;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: 0.15em;
}
#error {
  display: none;
  text-align: center;
  padding: 4rem;
  font-family: var(--mono);
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--red);
}

/* ── Animations ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.card:nth-child(1) { animation-delay: 0.05s; }
.card:nth-child(2) { animation-delay: 0.10s; }
.card:nth-child(3) { animation-delay: 0.15s; }
.card:nth-child(4) { animation-delay: 0.20s; }
.card:nth-child(5) { animation-delay: 0.25s; }
.card:nth-child(6) { animation-delay: 0.30s; }
</style>
</head>
<body>

<div class="container">
  <div id="loading">LOADING...</div>
  <div id="error">データの読み込みに失敗しました。<br>data.json が同じディレクトリにあるか確認してください。</div>
  <div id="main" style="display:none"></div>
</div>

<script>
const CAT_CONFIG = {
  "GLD":  { color: "#fbbf24", label: "ゴールド" },
  "円":   { color: "#f472b6", label: "円資産" },
  "ドル": { color: "#818cf8", label: "ドル建て" },
  "VT":   { color: "#38bdf8", label: "全世界株" },
  "債券": { color: "#34d399", label: "債券" },
  "暗号": { color: "#fb923c", label: "暗号資産" },
  "日本": { color: "#f87171", label: "日本株" },
  "サウス":{ color: "#2dd4bf", label: "サウス" },
};
const DEFAULT_COLOR = "#64748b";
const CARD_CLASSES = ["yellow", "blue", "purple", "green", "red", "orange"];

function catColor(c) { return (CAT_CONFIG[c]||{}).color||DEFAULT_COLOR; }
function catLabel(c) { return (CAT_CONFIG[c]||{}).label||c; }
function fmt(v) { return Math.round(v).toLocaleString('ja-JP'); }

Chart.defaults.color = '#64748b';
Chart.defaults.font.family = "'Space Mono', monospace";
Chart.defaults.font.weight = 700;

function makeDoughnut(id, items) {
  const ctx = document.getElementById(id).getContext('2d');
  const total = items.reduce((s,i)=>s+i.value,0);
  return new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: items.map(i => catLabel(i.category||i.name)),
      datasets: [{
        data: items.map(i => i.value),
        backgroundColor: items.map(i => catColor(i.category||i.name) + 'cc'),
        borderColor: '#080c14',
        borderWidth: 3,
        hoverOffset: 6,
      }]
    },
    options: {
      cutout: '65%',
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#0d1520',
          titleFont: { family: "'Space Mono', monospace", weight: 700, size: 11 },
          bodyFont: { family: "'Space Mono', monospace", weight: 700, size: 11 },
          borderColor: 'rgba(56,189,248,0.2)',
          borderWidth: 1,
          padding: 10,
          cornerRadius: 6,
          callbacks: {
            label: function(c) {
              const pct = total > 0 ? ((c.raw/total)*100).toFixed(1) : 0;
              return ` ${fmt(c.raw)} 万円 (${pct}%)`;
            }
          }
        }
      }
    }
  });
}

function makeBar(id, items) {
  const ctx = document.getElementById(id).getContext('2d');
  return new Chart(ctx, {
    type: 'bar',
    data: {
      labels: items.map(i => {
        const l = catLabel(i.category||i.name);
        return l.length > 5 ? l.slice(0,5)+'…' : l;
      }),
      datasets: [{
        data: items.map(i => i.value),
        backgroundColor: items.map(i => catColor(i.category||i.name) + 'cc'),
        borderRadius: 4,
        borderSkipped: false,
        barPercentage: 0.7,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#0d1520',
          titleFont: { family: "'Space Mono', monospace", weight: 700, size: 11 },
          bodyFont: { family: "'Space Mono', monospace", weight: 700, size: 11 },
          borderColor: 'rgba(56,189,248,0.2)',
          borderWidth: 1,
          padding: 10,
          cornerRadius: 6,
          callbacks: {
            label: c => ` ${fmt(c.raw)} 万円`
          }
        }
      },
      scales: {
        x: {
          ticks: { color: '#374151', font: { family: "'Space Mono'", size: 9, weight: 700 } },
          grid: { color: 'rgba(56,189,248,0.05)' },
          border: { display: false }
        },
        y: {
          ticks: { color: '#374151', font: { family: "'Space Mono'", size: 9, weight: 700 }, callback: v => fmt(v) },
          grid: { color: 'rgba(56,189,248,0.05)' },
          border: { display: false }
        }
      }
    }
  });
}

function makeLegend(containerId, items, total) {
  const el = document.getElementById(containerId);
  if (!el) return;
  items.forEach(i => {
    const pct = total > 0 ? ((i.value / total) * 100).toFixed(1) : 0;
    el.innerHTML += `<span class="l-item">
      <span class="l-dot" style="background:${catColor(i.category||i.name)}"></span>
      ${catLabel(i.category||i.name)} ${pct}%
    </span>`;
  });
}

function makeAllTable(items, total) {
  let rows = '';
  items.filter(i => i.value !== 0).forEach(i => {
    const pct = total > 0 ? ((Math.abs(i.value) / total) * 100).toFixed(1) : 0;
    const cat = i.category && i.category !== '-' ? i.category : '';
    const col = cat ? catColor(cat) : DEFAULT_COLOR;
    const isNeg = i.value < 0;
    const catCell = cat
      ? `<td><span class="badge" style="background:${col}22;color:${col}">${cat}</span></td>`
      : `<td><span class="badge" style="background:rgba(100,116,139,0.15);color:#64748b">—</span></td>`;
    rows += `<tr>
      <td class="name">${i.name}</td>
      ${catCell}
      <td class="r ${isNeg?'neg':''}">${isNeg?'−':''}${fmt(Math.abs(i.value))}<span style="font-size:0.6rem;color:var(--muted);margin-left:3px">万円</span></td>
      <td class="r" style="color:var(--muted)">${pct}%</td>
      <td style="min-width:60px"><div class="bar-bg"><div class="bar-fill" style="width:${Math.min(parseFloat(pct)*1.5,100)}%;background:${col}"></div></div></td>
    </tr>`;
  });
  return `<div class="table-wrap">
    <div class="table-header"><div class="table-title">ALL ACCOUNTS</div></div>
    <div class="table-scroll"><table>
      <thead><tr><th>NAME</th><th>CATEGORY</th><th class="r">AMOUNT</th><th class="r">RATIO</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>
  </div>`;
}

async function init() {
  try {
    const res = await fetch('./data.json');
    if (!res.ok) throw new Error('fetch failed');
    const data = await res.json();
    render(data);
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
  }
}

function render(data) {
  document.getElementById('loading').style.display = 'none';
  const main = document.getElementById('main');
  main.style.display = 'block';

  const positiveCats = data.categories.filter(c => c.value > 0);
  const positiveTotal = positiveCats.reduce((s,c) => s+c.value, 0);
  const colorMap = { "#fbbf24":"yellow", "#f472b6":"pink", "#818cf8":"purple", "#38bdf8":"blue", "#34d399":"green", "#fb923c":"orange", "#f87171":"red" };

  // Summary cards
  let catCards = '';
  positiveCats.forEach((c, idx) => {
    const col = catColor(c.name);
    const pct = data.total > 0 ? ((c.value / data.total) * 100).toFixed(1) : 0;
    const cssClass = colorMap[col] || 'blue';
    catCards += `<div class="card">
      <div style="position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,${col},transparent)"></div>
      <div class="card-label">${catLabel(c.name)}</div>
      <div class="card-value" style="color:${col}">${fmt(c.value)}<span style="font-size:0.65rem;color:var(--muted);margin-left:4px">万円</span></div>
      <div class="card-sub">${pct}%</div>
    </div>`;
  });

  main.innerHTML = `
    <header>
      <div class="logo">
        <div class="logo-dot"></div>
        ZAIM_DASH
      </div>
      <span class="timestamp" id="ts">${data.updated} 更新</span>
    </header>

    <div class="total-card">
      <div class="total-label">TOTAL NET ASSETS</div>
      <div class="total-value">${fmt(data.total)}<span>万円</span></div>
      <div class="total-updated">${data.updated} 更新</div>
    </div>

    <div class="section-title">— OVERVIEW</div>
    <div class="summary-grid">${catCards}</div>

    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-title">ASSET ALLOCATION</div>
        <div class="chart-container"><canvas id="pie-main"></canvas></div>
        <div class="legend" id="leg-main"></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">BY CATEGORY</div>
        <div class="chart-container"><canvas id="bar-main"></canvas></div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="section-title">— ALL ACCOUNTS</div>
    ${makeAllTable(data.accounts, data.total)}
  `;

  setTimeout(() => {
    const ovItems = positiveCats.map(c => ({...c, category: c.name}));
    makeDoughnut('pie-main', ovItems);
    makeBar('bar-main', ovItems);
    makeLegend('leg-main', ovItems, positiveTotal);
  }, 50);
}

init();
</script>
</body>
</html>
