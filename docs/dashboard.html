<script>
// ── ページ読み込み前に保存済みテーマを即適用（ちらつき防止） ──
(function() {
  try {
    const saved = localStorage.getItem('zaim2_theme');
    if (saved === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
      const meta = document.querySelector('meta[name="theme-color"]');
      if (meta) meta.setAttribute('content', '#0f1419');
    }
  } catch(e) {}
})();
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<style>

  --bg: #f8f9fb;
  --surface: #ffffff;
  --border: #e2e5ea;
  --accent: #2563eb;
  --text: #1a1d23;
  --muted: #6b7280;
  --red: #dc2626;
  --green: #16a34a;
  --table-head-bg: #374151;
  --table-head-text: #ffffff;
  --row-border: #f0f1f3;
  --row-hover: #f5f6f8;
  --empty-badge-bg: #f0f1f3;
  --empty-badge-text: #6b7280;
  --select-bg: #ffffff;
  --card-active-bg: color-mix(in srgb, var(--card-color) 8%, white);

[data-theme="dark"] {
  --bg: #0f1419;
  --surface: #1a1f26;
  --border: #2a3038;
  --accent: #60a5fa;
  --text: #e4e7eb;
  --muted: #9ca3af;
  --red: #f87171;
  --green: #4ade80;
  --table-head-bg: #2a3038;

  --row-border: #242930;

  --empty-badge-bg: #2a3038;
  --empty-badge-text: #9ca3af;
  --select-bg: #1a1f26;
  --card-active-bg: #2a3038;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-weight: 700;

.container {

/* ── テーマ切替ボタン ── */
.theme-toggle {
  position: fixed;
  top: 12px;
  right: 12px;
  z-index: 100;
  width: 38px;
  height: 38px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
  font-size: 1.2rem;
  display: flex;
  align-items: center;

  -webkit-tap-highlight-color: transparent;
}
.theme-toggle:hover { transform: scale(1.08); }
.theme-toggle:active { transform: scale(0.95); }

.donut-timestamp {
  position: absolute;
  bottom: 6px;
  right: 6px;

}

.donut-center {

<body>

<button id="theme-toggle" class="theme-toggle" aria-label="テーマ切替" title="ライト/ダーク切替">🌙</button>

<div class="container">
  <div id="loading">LOADING...</div>
  <div id="error">データの読み込みに失敗しました。<br>data.json が同じディレクトリにあるか確認してください。</div>
  <div id="main" style="display:none"></div>
</div>

<script>
const CAT_CONFIG = {
  "GLD":  { color: "#eab308", label: "ゴールド" },
  "円":   { color: "#db2777", label: "円資産" },
  "ドル": { color: "#6366f1", label: "ドル資産" },
  "VT":   { color: "#2563eb", label: "全世界株" },
  "債券": { color: "#84cc16", label: "債券" },
  "暗号": { color: "#9ca3af", label: "暗号資産" },
  "日本": { color: "#ea580c", label: "日本株" },
  "サウス":{ color: "#16a34a", label: "サウス" },
};
const DEFAULT_COLOR = "#6b7280";

// ── カテゴリ上書き管理（localStorage） ──
const STORAGE_KEY = "zaim2_category_overrides";
const VALUE_STORAGE_KEY = "zaim2_value_overrides";

function loadOverrides() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
  } catch(e) {
    return {};
  }
}

function saveOverrides(obj) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(obj));
}

function setOverride(name, category) {
  const ov = loadOverrides();
  if (category === "__clear__") {
    delete ov[name];
  } else {
    ov[name] = category;
  }
  saveOverrides(ov);
}

// ── 金額上書き管理（localStorage） ──
function loadValueOverrides() {
  try {
    return JSON.parse(localStorage.getItem(VALUE_STORAGE_KEY) || "{}");
  } catch(e) {
    return {};
  }
}

function saveValueOverrides(obj) {
  localStorage.setItem(VALUE_STORAGE_KEY, JSON.stringify(obj));
}

function setValueOverride(name, value) {
  const ov = loadValueOverrides();
  if (value === null) {
    delete ov[name];
  } else {
    ov[name] = value;
  }
  saveValueOverrides(ov);
}

function applyOverrides(accounts) {
  const catOv = loadOverrides();
  const valOv = loadValueOverrides();
  return accounts.map(a => {
    let modified = a;
    let overridden = false;
    if (catOv.hasOwnProperty(a.name)) {
      modified = { ...modified, category: catOv[a.name] };
      overridden = true;
    }
    if (valOv.hasOwnProperty(a.name)) {
      modified = { ...modified, value: valOv[a.name] };
      overridden = true;
    }
    if (overridden) {
      modified._overridden = true;
    }
    return modified;
  });
}

function recalcCategories(accounts, originalCategories) {
  const totals = {};
  accounts.forEach(a => {
    const cat = a.category;
    if (cat && cat !== "-") {
      totals[cat] = (totals[cat] || 0) + a.value;
    }
  });
  const total = Object.values(totals).reduce((a,b) => a+b, 0);

  // 元のdiff情報をマップ化
  const diffMap = {};
  if (originalCategories) {
    originalCategories.forEach(c => {
      if (c.diff !== undefined) diffMap[c.name] = c.diff;
    });
  }

  const categories = Object.entries(totals)
    .map(([name, value]) => {
      const entry = { name, value: Math.round(value) };
      if (diffMap[name] !== undefined) entry.diff = diffMap[name];
      return entry;
    })
    .sort((a,b) => b.value - a.value);
  return { total: Math.round(total), categories };
}

function catColor(c) { return (CAT_CONFIG[c]||{}).color||DEFAULT_COLOR; }
function catLabel(c) { return (CAT_CONFIG[c]||{}).label||c; }
function fmtNoComma(v) { return String(Math.round(v)); }

// "2026/04/11 13:10" → "04/11 13:10"（西暦を削除）
function formatTimestamp(s) {
  if (!s) return '';
  return String(s).replace(/^\d{4}\//, '');
}

// ── テーマ切替機能 ──
const THEME_KEY = 'zaim2_theme';

function getTheme() {
  return document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
}

function applyChartTheme() {
  // CSS変数から色を読み取ってChart.jsのデフォルトに反映
  const styles = getComputedStyle(document.documentElement);
  Chart.defaults.color = styles.getPropertyValue('--muted').trim() || '#6b7280';
}

function setTheme(theme) {
  if (theme === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
  } else {
    document.documentElement.removeAttribute('data-theme');
  }
  try { localStorage.setItem(THEME_KEY, theme); } catch(e) {}
  // ステータスバー色を更新（iOSホーム画面アプリ対応）
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.setAttribute('content', theme === 'dark' ? '#0f1419' : '#2563eb');
  updateThemeButton();
  applyChartTheme();
  // 既存のグラフを再描画してラベル色を更新
  if (_rawData) rerender();
}

function updateThemeButton() {
  const btn = document.getElementById('theme-toggle');
  if (!btn) return;
  btn.textContent = getTheme() === 'dark' ? '☀️' : '🌙';
}

function toggleTheme() {
  setTheme(getTheme() === 'dark' ? 'light' : 'dark');
}

applyChartTheme();
Chart.defaults.font.family = "'Noto Sans JP', sans-serif";
Chart.defaults.font.weight = 700;

Chart.register(ChartDataLabels);

function makeDoughnut(id, items, total) {
  const ctx = document.getElementById(id).getContext('2d');
  const colors = items.map(i => catColor(i.category||i.name));

  return new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: items.map(i => catLabel(i.category||i.name)),
      datasets: [{
        data: items.map(i => i.value),
        backgroundColor: colors,
        borderColor: 'transparent',
        borderWidth: 2,
        hoverOffset: 0,
      }]
    },
    options: {
      cutout: '42%',
      responsive: true,
      maintainAspectRatio: true,
      events: [],
      layout: {
        padding: window.innerWidth <= 768
          ? { top: 10, bottom: 10, left: 30, right: 30 }
          : { top: 20, bottom: 20, left: 60, right: 60 }
      },
      plugins: {
        legend: { display: false },
        tooltip: { enabled: false },
        datalabels: {
          display: function(ctx) {
            const value = ctx.dataset.data[ctx.dataIndex];
            return total > 0 && (value / total) > 0.04;
          },
          anchor: 'center',
          align: 'center',
          offset: 0,
          color: '#ffffff',
          textAlign: 'center',
          font: function(ctx) {
            const value = ctx.dataset ? ctx.dataset.data[ctx.dataIndex] : 0;
            const pct = total > 0 ? (value / total) : 0;
            const isMobile = window.innerWidth <= 768;
            const baseSize = isMobile ? 13 : 18;
            return {
              family: "'Noto Sans JP', sans-serif",
              weight: 900,
              size: pct > 0.25 ? baseSize + 3 : (pct > 0.1 ? baseSize : baseSize - 3)
            };
          },
          formatter: function(value, ctx) {
            const item = items[ctx.dataIndex];
            if (!item) return '';
            const label = catLabel(item.category || item.name);
            const pct = total > 0 ? ((value / total) * 100).toFixed(1) : 0;
            return label + '\n' + fmtNoComma(value) + '万\n' + pct + '%';
          }
        }
      }
    },
    plugins: []
  });
}

function makeAllTable(items, total) {
  let rows = '';
  const valOv = loadValueOverrides();
  items.filter(i => i.value !== 0).forEach(i => {
    const cat = i.category && i.category !== '-' ? i.category : '';
    const col = cat ? catColor(cat) : DEFAULT_COLOR;
    const isNeg = i.value < 0;
    const overrideClass = i._overridden ? ' overridden' : '';
    const valOverridden = valOv.hasOwnProperty(i.name);
    const valOverClass = valOverridden ? ' val-overridden' : '';
    const catCell = cat
      ? `<td><span class="badge${overrideClass}" data-name="${escapeHtml(i.name)}" data-cat="${cat}" style="background:${col}15;color:${col}">${catLabel(cat)}</span></td>`
      : `<td><span class="badge${overrideClass}" data-name="${escapeHtml(i.name)}" data-cat="" style="background:var(--empty-badge-bg);color:var(--empty-badge-text)">—</span></td>`;
    rows += `<tr data-category="${cat}">
      <td class="name">${i.name}</td>
      ${catCell}
      <td class="r ${isNeg?'neg':''}"><span class="val-badge${valOverClass}" data-name="${escapeHtml(i.name)}" data-value="${i.value}">${isNeg?'−':''}${fmtNoComma(Math.abs(i.value))}<span style="font-size:0.65rem;color:var(--muted);margin-left:3px">万円</span></span></td>
    </tr>`;
  });

  const catOvCount = Object.keys(loadOverrides()).length;
  const valOvCount = Object.keys(valOv).length;
  const totalOvCount = catOvCount + valOvCount;
  const toolbar = `<div class="edit-toolbar">
    <span class="hint">💡 カテゴリ・金額をタップで変更${totalOvCount>0?` ・ ${totalOvCount}件上書き中`:''}</span>
    ${totalOvCount>0?'<button id="btn-reset-overrides" class="danger">すべてリセット</button>':''}
  </div>`;

  return `<div class="table-wrap">
    <div class="table-scroll"><table>
      <thead><tr><th>NAME</th><th>CATEGORY</th><th class="r">AMOUNT</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>
    ${toolbar}
  </div>`;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ── 差分HTML生成 ──
function renderDiffHtml(diff) {
  if (diff === undefined || diff === null) return '';
  if (diff > 0) {
    return `<div class="card-diff up">▲${fmtNoComma(diff)}万円</div>`;
  } else if (diff < 0) {
    return `<div class="card-diff down">▼${fmtNoComma(Math.abs(diff))}万円</div>`;
  } else {
    return '';
  }
}

let _rawData = null; // data.jsonの生データを保持

async function init() {
  try {
    const res = await fetch('./data.json');
    if (!res.ok) throw new Error('fetch failed');
    _rawData = await res.json();
    rerender();
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
  }
}

function rerender() {
  if (!_rawData) return;
  // overridesを適用して再計算
  const accounts = applyOverrides(_rawData.accounts);
  const { total, categories } = recalcCategories(accounts, _rawData.categories);
  const data = {
    ..._rawData,
    accounts,
    total,
    categories,
  };
  render(data);
}

function render(data) {
  document.getElementById('loading').style.display = 'none';
  const main = document.getElementById('main');
  main.style.display = 'block';

  // 既存のChart.jsインスタンスがあれば破棄（再描画時のメモリリーク防止）
  const existingChart = Chart.getChart('pie-main');
  if (existingChart) existingChart.destroy();

  // CAT_CONFIGに定義された全カテゴリーを表示（data.jsonに無いものは0円で補完）
  const existingNames = new Set(data.categories.map(c => c.name));
  const allCats = [...data.categories];
  Object.keys(CAT_CONFIG).forEach(name => {
    if (!existingNames.has(name)) {
      allCats.push({ name: name, value: 0 });
    }
  });

  const positiveCats = allCats;

  let catCards = '';
  positiveCats.forEach(c => {
    const col = catColor(c.name);
    const pct = data.total > 0 ? ((c.value / data.total) * 100).toFixed(1) : 0;
    const diffHtml = renderDiffHtml(c.diff);
    catCards += `<div class="card" style="--card-color:${col}" data-cat="${c.name}">
      ${diffHtml}
      <div class="card-label">${catLabel(c.name)}</div>
      <div class="card-row">
        <div class="card-value" style="color:${col}">${fmtNoComma(c.value)}<span style="font-size:0.6rem;color:var(--muted);margin-left:3px">万円</span></div>
        <div class="card-pct">${pct}%</div>
      </div>
    </div>`;
  });

  main.innerHTML = `
    <div class="top-section">
      <div class="donut-section">
        <div class="donut-wrap">
          <canvas id="pie-main"></canvas>
          <div class="donut-center">
            <div class="donut-center-label">TOTAL</div>
            <div class="donut-center-value" id="donut-center-value" data-real="${fmtNoComma(data.total)}" title="タップで表示／非表示">${fmtNoComma(data.total)}</div>
            <div class="donut-center-unit">万円</div>
          </div>
          <div class="donut-timestamp">${formatTimestamp(data.updated)} 更新</div>
        </div>
      </div>
      <div class="overview-section">
        <div class="summary-grid">${catCards}</div>
      </div>
    </div>

    ${makeAllTable(data.accounts, data.total)}
  `;

  setTimeout(() => {
    const ovItems = positiveCats.map(c => ({...c, category: c.name}));
    makeDoughnut('pie-main', ovItems, data.total);
  }, 80);

  // 円グラフ中央の金額タップで表示／非表示を切替
  const centerValueEl = document.getElementById('donut-center-value');
  if (centerValueEl) {
    // 再描画後もマスク状態を復元
    if (window._centerMasked) {
      const real = centerValueEl.dataset.real || '';
      centerValueEl.textContent = '*'.repeat(real.length);
      centerValueEl.classList.add('masked');
    }
    centerValueEl.addEventListener('click', () => {
      const real = centerValueEl.dataset.real || '';
      if (centerValueEl.classList.contains('masked')) {
        centerValueEl.textContent = real;
        centerValueEl.classList.remove('masked');
        window._centerMasked = false;
      } else {
        centerValueEl.textContent = '*'.repeat(real.length);
        centerValueEl.classList.add('masked');
        window._centerMasked = true;
      }
    });
  }

  // Card click → filter table
  let activeFilter = null;
  setTimeout(() => {
    document.querySelectorAll('.card[data-cat]').forEach(card => {
      card.addEventListener('click', () => {
        const cat = card.dataset.cat;
        if (activeFilter === cat) {
          // Deselect
          activeFilter = null;
          card.classList.remove('active');
          document.querySelectorAll('table tbody tr').forEach(tr => tr.style.display = '');
        } else {
          // Select
          activeFilter = cat;
          document.querySelectorAll('.card[data-cat]').forEach(c => c.classList.remove('active'));
          card.classList.add('active');
          document.querySelectorAll('table tbody tr').forEach(tr => {
            tr.style.display = tr.dataset.category === cat ? '' : 'none';
          });
        }
      });
    });

    // ── バッジクリック → プルダウン表示 ──
    document.querySelectorAll('.badge[data-name]').forEach(badge => {
      badge.addEventListener('click', (e) => {
        e.stopPropagation();
        const name = badge.dataset.name;
        const currentCat = badge.dataset.cat;
        showCategoryPicker(badge, name, currentCat);
      });
    });

    // ── 金額バッジクリック → インライン編集 ──
    document.querySelectorAll('.val-badge[data-name]').forEach(valBadge => {
      valBadge.addEventListener('click', (e) => {
        e.stopPropagation();
        const name = valBadge.dataset.name;
        const currentVal = parseFloat(valBadge.dataset.value);
        showValueEditor(valBadge, name, currentVal);
      });
    });

    // ── リセットボタン ──
    const resetBtn = document.getElementById('btn-reset-overrides');
    if (resetBtn) {
      resetBtn.addEventListener('click', () => {
        if (confirm('すべての上書き設定（カテゴリ・金額）をリセットしますか？')) {
          localStorage.removeItem(STORAGE_KEY);
          localStorage.removeItem(VALUE_STORAGE_KEY);
          rerender();
        }
      });
    }
  }, 100);
}

// ── プルダウンでカテゴリ選択 ──
function showCategoryPicker(badgeEl, name, currentCat) {
  // 既に開いているselectがあれば閉じる
  const existing = document.querySelector('.cat-select');
  if (existing) existing.remove();

  const select = document.createElement('select');
  select.className = 'cat-select';

  // 「指定なし」選択肢
  const emptyOpt = document.createElement('option');
  emptyOpt.value = '-';
  emptyOpt.textContent = '— 未分類';
  if (!currentCat) emptyOpt.selected = true;
  select.appendChild(emptyOpt);

  // CAT_CONFIGに定義されたカテゴリをすべて選択肢に
  Object.entries(CAT_CONFIG).forEach(([key, cfg]) => {
    const opt = document.createElement('option');
    opt.value = key;
    opt.textContent = cfg.label;
    if (key === currentCat) opt.selected = true;
    select.appendChild(opt);
  });

  // 「自動判定に戻す」
  const clearOpt = document.createElement('option');
  clearOpt.value = '__clear__';
  clearOpt.textContent = '↺ 自動判定に戻す';
  select.appendChild(clearOpt);

  // バッジを置き換え
  badgeEl.style.display = 'none';
  badgeEl.parentNode.appendChild(select);
  select.focus();

  const cleanup = () => {
    select.remove();
    badgeEl.style.display = '';
  };

  select.addEventListener('change', () => {
    const newCat = select.value;
    setOverride(name, newCat);
    cleanup();
    rerender();
  });

  select.addEventListener('blur', cleanup);
}

// ── インライン金額編集 ──
function showValueEditor(valBadgeEl, name, currentVal) {
  // 既に開いているエディタがあれば閉じる
  const existing = document.querySelector('.val-edit-wrap');
  if (existing) existing.remove();

  const wrap = document.createElement('span');
  wrap.className = 'val-edit-wrap';

  const input = document.createElement('input');
  input.type = 'number';
  input.className = 'val-input';
  input.value = currentVal;
  input.step = '1';

  const unitSpan = document.createElement('span');
  unitSpan.className = 'val-input-unit';
  unitSpan.textContent = '万円';

  const actions = document.createElement('span');
  actions.className = 'val-input-actions';

  const saveBtn = document.createElement('button');
  saveBtn.className = 'save';
  saveBtn.textContent = '✓';

  const valOv = loadValueOverrides();
  const hasOverride = valOv.hasOwnProperty(name);

  actions.appendChild(saveBtn);

  if (hasOverride) {
    const restoreBtn = document.createElement('button');
    restoreBtn.className = 'restore';
    restoreBtn.textContent = '↺ 戻す';
    actions.appendChild(restoreBtn);
    restoreBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      setValueOverride(name, null);
      cleanup();
      rerender();
    });
  }

  wrap.appendChild(input);
  wrap.appendChild(unitSpan);
  wrap.appendChild(actions);

  valBadgeEl.style.display = 'none';
  valBadgeEl.parentNode.appendChild(wrap);
  input.focus();
  input.select();

  const cleanup = () => {
    wrap.remove();
    valBadgeEl.style.display = '';
  };

  const doSave = () => {
    const newVal = parseFloat(input.value);
    if (!isNaN(newVal)) {
      setValueOverride(name, Math.round(newVal));
      cleanup();
      rerender();
    } else {
      cleanup();
    }
  };

  saveBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    doSave();
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); doSave(); }
    if (e.key === 'Escape') { e.preventDefault(); cleanup(); }
  });

  // クリック外で閉じる（少し遅延させてイベント伝播を防ぐ）
  setTimeout(() => {
    const onClickOutside = (e) => {
      if (!wrap.contains(e.target)) {
        cleanup();
        document.removeEventListener('click', onClickOutside, true);
      }
    };
    document.addEventListener('click', onClickOutside, true);
  }, 10);
}

// テーマ切替ボタンの初期化
updateThemeButton();
document.getElementById('theme-toggle').addEventListener('click', toggleTheme);

init();

// Service Worker 登録
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
