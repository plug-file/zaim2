<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>資産ダッシュボード</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --bg: #0e0f11;
  --surface: #16181c;
  --surface2: #1e2026;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #e8e9eb;
  --text2: #8b8d93;
  --text3: #555860;
  --accent: #c8a97e;
  --accent2: #8db4d4;
  --green: #6db88a;
  --red: #c97070;

  --c-yen:   #8db4d4;
  --c-vt:    #c8a97e;
  --c-gld:   #d4b483;
  --c-bond:  #7db89a;
  --c-dol:   #a89bc8;
  --c-jp:    #c88da0;
  --c-south: #8fc8b8;
  --c-crypto:#c8b07a;
  --c-other: #777a82;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.6;
}

.mono { font-family: 'DM Mono', monospace; }

/* ── レイアウト ── */
.app { max-width: 960px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }

/* ── ヘッダー ── */
.hd {
  display: flex; align-items: flex-end; justify-content: space-between;
  margin-bottom: 2.5rem; flex-wrap: wrap; gap: 8px;
}
.hd-left {}
.hd-label { font-size: 11px; letter-spacing: .12em; color: var(--text3); text-transform: uppercase; margin-bottom: 4px; }
.hd-total { font-size: 42px; font-weight: 300; color: var(--text); letter-spacing: -.02em; }
.hd-total span { font-size: 16px; color: var(--text2); margin-left: 4px; }
.hd-updated { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }

/* ── タブ ── */
.tabs { display: flex; gap: 0; margin-bottom: 2rem; border-bottom: 1px solid var(--border); }
.tab {
  font-size: 13px; padding: 10px 18px; cursor: pointer;
  background: none; border: none; color: var(--text2);
  border-bottom: 2px solid transparent; margin-bottom: -1px;
  font-family: 'Noto Sans JP', sans-serif;
  letter-spacing: .02em; transition: color .15s;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }

.panel { display: none; animation: fadeIn .2s ease; }
.panel.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

/* ── サマリーカード ── */
.summary-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 10px; margin-bottom: 2rem;
}
.s-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px; padding: 14px 16px;
  position: relative; overflow: hidden;
}
.s-card::before {
  content: ''; position: absolute; top: 0; left: 0;
  width: 3px; height: 100%; border-radius: 8px 0 0 8px;
}
.s-card-label { font-size: 11px; color: var(--text3); margin-bottom: 6px; letter-spacing: .06em; }
.s-card-val { font-size: 20px; font-weight: 400; font-family: 'DM Mono', monospace; color: var(--text); }
.s-card-pct { font-size: 11px; color: var(--text3); margin-top: 3px; font-family: 'DM Mono', monospace; }

/* ── チャートエリア ── */
.chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 2rem; }
@media(max-width: 560px) { .chart-row { grid-template-columns: 1fr; } }

.c-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px; padding: 20px;
}
.c-card-title {
  font-size: 11px; letter-spacing: .1em; color: var(--text3);
  text-transform: uppercase; margin-bottom: 16px;
}
.c-wrap { position: relative; height: 220px; }
.legend { display: flex; flex-wrap: wrap; gap: 8px 14px; margin-top: 14px; }
.l-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text2); }
.l-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

/* ── テーブル ── */
.tbl-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
table { width: 100%; border-collapse: collapse; }
thead th {
  font-size: 11px; letter-spacing: .08em; color: var(--text3);
  text-transform: uppercase; font-weight: 400;
  padding: 12px 16px; text-align: left;
  border-bottom: 1px solid var(--border); background: var(--surface2);
}
thead th.r { text-align: right; }
tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--surface2); }
td { padding: 12px 16px; font-size: 13px; color: var(--text); }
td.r { text-align: right; font-family: 'DM Mono', monospace; font-size: 13px; }
td.muted { color: var(--text2); }
td.cat { font-size: 11px; }

.badge {
  display: inline-block; padding: 2px 8px; border-radius: 4px;
  font-size: 11px; font-weight: 500; letter-spacing: .04em;
}

.bar-bg { background: rgba(255,255,255,0.06); border-radius: 2px; height: 4px; width: 100%; overflow: hidden; min-width: 60px; }
.bar-fill { height: 100%; border-radius: 2px; }

/* ── シングルスタット（GLD/債券タブ） ── */
.stat-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 2rem; }
.stat-big {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 24px 28px; flex: 1; min-width: 160px;
}
.stat-big-label { font-size: 11px; color: var(--text3); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 8px; }
.stat-big-val { font-size: 32px; font-weight: 300; font-family: 'DM Mono', monospace; color: var(--text); }
.stat-big-sub { font-size: 12px; color: var(--text3); margin-top: 4px; }

.progress-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 2rem; }
.progress-label { font-size: 11px; color: var(--text3); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 12px; }
.progress-track { background: rgba(255,255,255,0.06); border-radius: 4px; height: 8px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 4px; transition: width .6s ease; }

/* ── ローディング ── */
#loading { text-align: center; padding: 4rem; color: var(--text3); font-size: 13px; letter-spacing: .08em; }
#error { display: none; text-align: center; padding: 4rem; color: var(--red); font-size: 13px; }
</style>
</head>
<body>
<div class="app">
  <div id="loading">LOADING...</div>
  <div id="error">データの読み込みに失敗しました。<br>data.json が同じディレクトリにあるか確認してください。</div>
  <div id="main" style="display:none">

    <div class="hd">
      <div class="hd-left">
        <div class="hd-label">Net Assets</div>
        <div class="hd-total mono" id="hd-total">—<span>万円</span></div>
      </div>
      <div class="hd-updated" id="hd-updated">—</div>
    </div>

    <div class="summary-grid" id="summary-grid"></div>

    <div class="tabs" id="tabs">
      <button class="tab active" data-tab="overview">概要</button>
    </div>

    <div id="panels"></div>

  </div>
</div>

<script>
// ── カテゴリ設定 ──────────────────────────────
const CAT_CONFIG = {
  "円":   { color: "#8db4d4", label: "円資産" },
  "VT":   { color: "#c8a97e", label: "VT（全世界株）" },
  "GLD":  { color: "#d4b483", label: "ゴールド" },
  "債券": { color: "#7db89a", label: "債券" },
  "ドル": { color: "#a89bc8", label: "ドル建て" },
  "日本": { color: "#c88da0", label: "日本株" },
  "サウス":{ color: "#8fc8b8", label: "サウス" },
  "暗号": { color: "#c8b07a", label: "暗号資産" },
};
const DEFAULT_COLOR = "#555860";

function catColor(cat) {
  return (CAT_CONFIG[cat] || {}).color || DEFAULT_COLOR;
}
function catLabel(cat) {
  return (CAT_CONFIG[cat] || {}).label || cat;
}

function fmt(v) {
  return Math.round(v).toLocaleString('ja-JP');
}

// ── Chart.js共通設定 ──────────────────────────
Chart.defaults.color = '#8b8d93';
Chart.defaults.font.family = "'DM Mono', monospace";

function makeDoughnut(canvasId, items) {
  const ctx = document.getElementById(canvasId).getContext('2d');
  const total = items.reduce((s, i) => s + i.value, 0);
  return new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: items.map(i => i.name),
      datasets: [{
        data: items.map(i => i.value),
        backgroundColor: items.map(i => catColor(i.category || i.name)),
        borderWidth: 3,
        borderColor: '#0e0f11',
        hoverOffset: 6
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '65%',
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: c => {
              const pct = total > 0 ? ((c.raw / total) * 100).toFixed(1) : 0;
              return ` ¥${fmt(c.raw)}万  (${pct}%)`;
            }
          },
          backgroundColor: '#1e2026', borderColor: 'rgba(255,255,255,.1)', borderWidth: 1,
          titleColor: '#e8e9eb', bodyColor: '#8b8d93', padding: 10
        }
      }
    }
  });
}

function makeBar(canvasId, items) {
  const ctx = document.getElementById(canvasId).getContext('2d');
  return new Chart(ctx, {
    type: 'bar',
    data: {
      labels: items.map(i => i.name),
      datasets: [{
        data: items.map(i => i.value),
        backgroundColor: items.map(i => catColor(i.category || i.name)),
        borderRadius: 4, borderSkipped: false
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false },
        tooltip: {
          callbacks: { label: c => ` ¥${fmt(c.raw)}万` },
          backgroundColor: '#1e2026', borderColor: 'rgba(255,255,255,.1)', borderWidth: 1,
          titleColor: '#e8e9eb', bodyColor: '#8b8d93', padding: 10
        }
      },
      scales: {
        x: {
          ticks: { color: '#555860', font: { size: 11 }, maxRotation: 40 },
          grid: { display: false }, border: { color: 'rgba(255,255,255,.07)' }
        },
        y: {
          ticks: { color: '#555860', font: { size: 11 }, callback: v => v + '万' },
          grid: { color: 'rgba(255,255,255,.04)' }, border: { display: false }
        }
      }
    }
  });
}

function makeLegend(containerId, items, total) {
  const el = document.getElementById(containerId);
  if (!el) return;
  items.forEach(i => {
    const pct = total > 0 ? ((i.value / total) * 100).toFixed(1) : 0;
    el.innerHTML += `<span class="l-item">
      <span class="l-dot" style="background:${catColor(i.category||i.name)}"></span>
      ${i.name} <span style="color:var(--text3);margin-left:2px">${pct}%</span>
    </span>`;
  });
}

// ── テーブル生成 ──────────────────────────────
function makeTable(items, total, showCat = false) {
  const catCol = showCat ? '<th>カテゴリ</th>' : '';
  let rows = '';
  items.filter(i => i.value !== 0).forEach(i => {
    const pct = total > 0 ? ((i.value / total) * 100).toFixed(1) : 0;
    const cat = i.category || i.name;
    const col = catColor(cat);
    const catCell = showCat
      ? `<td class="cat"><span class="badge" style="background:${col}22;color:${col}">${cat}</span></td>`
      : '';
    rows += `<tr>
      <td class="muted">${i.name}</td>
      ${catCell}
      <td class="r">¥${fmt(i.value)}<span style="font-size:11px;color:var(--text3)">万</span></td>
      <td class="r" style="color:var(--text3)">${pct}%</td>
      <td style="min-width:80px"><div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${col}"></div></div></td>
    </tr>`;
  });
  return `<div class="tbl-wrap"><table>
    <thead><tr><th>名称</th>${catCol}<th class="r">金額</th><th class="r">割合</th><th></th></tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

// ── パネル構築 ──────────────────────────────
function buildOverview(data) {
  const items = data.categories.filter(c => c.value > 0);
  return `
    <div class="chart-row">
      <div class="c-card">
        <div class="c-card-title">Asset Allocation</div>
        <div class="c-wrap"><canvas id="pie-overview"></canvas></div>
        <div class="legend" id="leg-overview"></div>
      </div>
      <div class="c-card">
        <div class="c-card-title">By Class (万円)</div>
        <div class="c-wrap"><canvas id="bar-overview"></canvas></div>
      </div>
    </div>
    ${makeTable(items, data.total, false)}
  `;
}

function buildCategoryPanel(catName, accounts, total) {
  const items = accounts.filter(a => a.category === catName && a.value !== 0);
  if (items.length === 0) {
    return `<div style="padding:3rem;text-align:center;color:var(--text3)">データなし</div>`;
  }
  const catTotal = items.reduce((s, i) => s + i.value, 0);
  const pctOfTotal = total > 0 ? ((catTotal / total) * 100).toFixed(1) : 0;
  const col = catColor(catName);
  return `
    <div class="stat-row">
      <div class="stat-big">
        <div class="stat-big-label">評価額</div>
        <div class="stat-big-val">¥${fmt(catTotal)}</div>
        <div class="stat-big-sub">万円</div>
      </div>
      <div class="stat-big">
        <div class="stat-big-label">総資産比</div>
        <div class="stat-big-val">${pctOfTotal}%</div>
        <div class="stat-big-sub">of total</div>
      </div>
      <div class="stat-big" style="flex:2">
        <div class="stat-big-label">構成比</div>
        <div class="progress-track" style="margin-top:16px">
          <div class="progress-fill" style="width:${pctOfTotal}%;background:${col}"></div>
        </div>
      </div>
    </div>
    <div class="chart-row">
      <div class="c-card">
        <div class="c-card-title">内訳</div>
        <div class="c-wrap"><canvas id="pie-${catName}"></canvas></div>
        <div class="legend" id="leg-${catName}"></div>
      </div>
      <div class="c-card">
        <div class="c-card-title">金額（万円）</div>
        <div class="c-wrap"><canvas id="bar-${catName}"></canvas></div>
      </div>
    </div>
    ${makeTable(items, catTotal, false)}
  `;
}

// ── タブ切り替え ──────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.dataset.panel === name));
}

// ── メイン ──────────────────────────────────
async function init() {
  try {
    const res = await fetch('./data.json');
    if (!res.ok) throw new Error('fetch failed');
    const data = await res.json();
    render(data);
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
  }
}

function render(data) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('main').style.display = 'block';

  // ヘッダー
  document.getElementById('hd-total').innerHTML = fmt(data.total) + '<span>万円</span>';
  document.getElementById('hd-updated').textContent = data.updated + ' 更新';

  // サマリーカード
  const grid = document.getElementById('summary-grid');
  data.categories.filter(c => c.value > 0).forEach(c => {
    const col = catColor(c.name);
    const pct = data.total > 0 ? ((c.value / data.total) * 100).toFixed(1) : 0;
    grid.innerHTML += `<div class="s-card" style="border-color:${col}22">
      <div style="position:absolute;top:0;left:0;width:3px;height:100%;background:${col};border-radius:8px 0 0 8px"></div>
      <div class="s-card-label">${c.name}</div>
      <div class="s-card-val">¥${fmt(c.value)}</div>
      <div class="s-card-pct">${pct}%</div>
    </div>`;
  });

  // タブ・パネル構築
  const tabsEl = document.getElementById('tabs');
  const panelsEl = document.getElementById('panels');

  // 概要パネル
  const overviewPanel = document.createElement('div');
  overviewPanel.className = 'panel active';
  overviewPanel.dataset.panel = 'overview';
  overviewPanel.innerHTML = buildOverview(data);
  panelsEl.appendChild(overviewPanel);

  // カテゴリタブ（値がある分だけ）
  const cats = [...new Set(data.accounts.map(a => a.category).filter(c => c && c !== '-' && c !== ''))];
  cats.forEach(cat => {
    const items = data.accounts.filter(a => a.category === cat && a.value !== 0);
    if (items.length === 0) return;

    // タブボタン
    const btn = document.createElement('button');
    btn.className = 'tab';
    btn.dataset.tab = cat;
    btn.textContent = cat;
    btn.onclick = () => switchTab(cat);
    tabsEl.appendChild(btn);

    // パネル
    const panel = document.createElement('div');
    panel.className = 'panel';
    panel.dataset.panel = cat;
    panel.innerHTML = buildCategoryPanel(cat, data.accounts, data.total);
    panelsEl.appendChild(panel);
  });

  // 全口座タブ
  const allBtn = document.createElement('button');
  allBtn.className = 'tab';
  allBtn.dataset.tab = 'all';
  allBtn.textContent = '全口座';
  allBtn.onclick = () => switchTab('all');
  tabsEl.appendChild(allBtn);

  const allPanel = document.createElement('div');
  allPanel.className = 'panel';
  allPanel.dataset.panel = 'all';
  allPanel.innerHTML = makeTable(data.accounts, data.total, true);
  panelsEl.appendChild(allPanel);

  // 概要タブのクリックハンドラ
  tabsEl.querySelector('[data-tab="overview"]').onclick = () => switchTab('overview');

  // チャート描画（少し遅らせてDOM確定後に）
  setTimeout(() => {
    const ovItems = data.categories.filter(c => c.value > 0).map(c => ({...c, category: c.name}));
    makeDoughnut('pie-overview', ovItems);
    makeBar('bar-overview', ovItems);
    makeLegend('leg-overview', ovItems, data.total);

    cats.forEach(cat => {
      const items = data.accounts.filter(a => a.category === cat && a.value !== 0);
      if (items.length === 0) return;
      if (document.getElementById(`pie-${cat}`)) {
        makeDoughnut(`pie-${cat}`, items);
        makeBar(`bar-${cat}`, items);
        makeLegend(`leg-${cat}`, items, items.reduce((s, i) => s + i.value, 0));
      }
    });
  }, 80);
}

init();
</script>
</body>
</html>
